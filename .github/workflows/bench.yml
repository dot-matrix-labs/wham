name: Performance Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Run benchmarks
        run: cargo bench -p ui-core 2>&1 | tee bench-output.txt

      - name: Parse criterion output to JSON
        run: |
          python3 -c "
          import re, json, sys
          results = []
          for line in open('bench-output.txt'):
              m = re.match(r'^(\S+)\s+time:\s+\[[\d.]+ [µmn]s ([\d.]+) ([µmn]s)', line)
              if m:
                  name, val, unit = m.group(1), float(m.group(2)), m.group(3)
                  # normalize to nanoseconds
                  mult = {'ns': 1, 'µs': 1000, 'ms': 1000000}
                  ns = val * mult.get(unit, 1)
                  results.append({'name': name, 'unit': 'ns', 'value': ns})
          json.dump(results, open('bench-results.json', 'w'), indent=2)
          print(f'Parsed {len(results)} benchmark results')
          "

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ui-core benchmarks
          tool: customSmallerIsBetter
          output-file-path: bench-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          comment-on-alert: true
          alert-comment-cc-users: '@${{ github.repository_owner }}'
          alert-threshold: '110%'
          fail-on-alert: ${{ github.event_name == 'pull_request' }}
          save-data-file: ${{ github.ref == 'refs/heads/main' }}

  wasm-size:
    name: Check WASM binary size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Build WASM
        run: cd crates/ui-wasm && wasm-pack build --target web --out-dir ../../examples/web/pkg

      - name: Check binary size
        run: |
          WASM_FILE=$(find examples/web/pkg -name '*.wasm' -type f | head -1)
          if [ -z "$WASM_FILE" ]; then
            echo "ERROR: No .wasm file found"
            exit 1
          fi

          RAW_SIZE=$(wc -c < "$WASM_FILE")
          GZIP_SIZE=$(gzip -c "$WASM_FILE" | wc -c)
          RAW_KB=$((RAW_SIZE / 1024))
          GZIP_KB=$((GZIP_SIZE / 1024))

          echo "## WASM Binary Size" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Raw | ${RAW_KB} KB (${RAW_SIZE} bytes) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gzipped | ${GZIP_KB} KB (${GZIP_SIZE} bytes) |" >> "$GITHUB_STEP_SUMMARY"

          echo "Raw size: ${RAW_KB} KB (${RAW_SIZE} bytes)"
          echo "Gzipped size: ${GZIP_KB} KB (${GZIP_SIZE} bytes)"

          MAX_GZIP_BYTES=512000  # 500 KB
          if [ "$GZIP_SIZE" -gt "$MAX_GZIP_BYTES" ]; then
            echo "FAIL: Gzipped WASM binary (${GZIP_KB} KB) exceeds 500 KB limit"
            exit 1
          else
            echo "PASS: Gzipped WASM binary (${GZIP_KB} KB) is within 500 KB limit"
          fi
