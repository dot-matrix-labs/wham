name: Test wham-test (headless screenshots)

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  screenshots:
    name: headless form screenshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-screenshots-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-screenshots-

      - name: Run wham-test suite
        run: cargo test -p wham-test

      - name: Render scenario screenshots
        run: |
          mkdir -p $GITHUB_WORKSPACE/tests/screenshots
          WHAM_SCREENSHOT_DIR=$GITHUB_WORKSPACE/tests/screenshots \
            cargo test -p wham-test screenshot -- --nocapture

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: form-screenshots
          path: ${{ github.workspace }}/tests/screenshots/
          retention-days: 30
